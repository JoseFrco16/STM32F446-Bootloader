name: Build STM32 Bootloader/APP

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [APP0, Bootloader]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ARM toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi make

    - name: Build project
      run: |
        cd ${{ matrix.project }}/Debug
        make clean
        make -j$(nproc)

    - name: Generate BIN and HEX
      run: |
        cd ${{ matrix.project }}/Debug
        arm-none-eabi-objcopy -O binary *.elf firmware.bin
        arm-none-eabi-objcopy -O ihex *.elf firmware.hex

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.project }}
        path: |
          ${{ matrix.project }}/Debug/*.elf
          ${{ matrix.project }}/Debug/*.bin
          ${{ matrix.project }}/Debug/*.hex
