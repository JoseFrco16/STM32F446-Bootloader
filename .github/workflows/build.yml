name: Build STM32 Bootloader/APP on Windows

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        project: [APP0, Bootloader]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download ARM GCC Toolchain
      run: |
        Invoke-WebRequest -Uri https://developer.arm.com/-/media/Files/downloads/gnu-rm/12.2-2023.05/gcc-arm-none-eabi-12.2-2023.05-win32.zip -OutFile gcc-arm-none-eabi.zip
        Expand-Archive gcc-arm-none-eabi.zip -DestinationPath C:\arm-gcc
      shell: powershell

    - name: Add ARM Toolchain to PATH
      run: |
        $env:Path = "C:\arm-gcc\gcc-arm-none-eabi-12.2-2023.05\bin;" + $env:Path
        echo "PATH updated"
      shell: powershell

    - name: Build project
      run: |
        cd ${{ matrix.project }}\Debug
        # Clean build project
        if (Test-Path "obj") { Remove-Item -Recurse -Force obj }
        mingw32-make.exe
      shell: powershell

    - name: Generate BIN and HEX
      run: |
        cd ${{ matrix.project }}\Debug
        arm-none-eabi-objcopy.exe -O binary *.elf firmware.bin
        arm-none-eabi-objcopy.exe -O ihex *.elf firmware.hex
      shell: powershell

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.project }}
        path: |
          ${{ matrix.project }}\Debug\*.elf
          ${{ matrix.project }}\Debug\*.bin
          ${{ matrix.project }}\Debug\*.hex
