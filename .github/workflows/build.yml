name: Build STM32 Bootloader/APP

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [APP0, Bootloader]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ARM toolchain
      run: |
        wget https://developer.arm.com/-/media/Files/downloads/gnu-rm/13.3-2023.05/gcc-arm-none-eabi-13.3-2023.05-x86_64-linux.tar.bz2
        tar -xjf gcc-arm-none-eabi-13.3-2023.05-x86_64-linux.tar.bz2
        echo "$PWD/gcc-arm-none-eabi-13.3-2023.05/bin" >> $GITHUB_PATH

    - name: Build project
      run: |
        cd ${{ matrix.project }}/Debug
        make clean
        make all

    - name: Generate BIN and HEX
      run: |
        cd ${{ matrix.project }}/Debug
        arm-none-eabi-objcopy -O binary *.elf firmware.bin
        arm-none-eabi-objcopy -O ihex *.elf firmware.hex

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.project }}
        path: |
          ${{ matrix.project }}/Debug/*.elf
          ${{ matrix.project }}/Debug/*.bin
          ${{ matrix.project }}/Debug/*.hex
